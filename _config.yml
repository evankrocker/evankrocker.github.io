title: My Vinyl Collection
description: A showcase of my cherished vinyl records.
author: Your Name
email: your.email@example.com
baseurl: "" # Leave blank if deploying to root, otherwise use /your-repo-name
url: "http://evankrocker.github.io" # Replace with your domain or GitHub Pages URL
permalink: /:title/ # Use a descriptive permalink structure

# Build settings
markdown: kramdown
theme: minima # Or choose another theme
plugins:
  - jekyll-feed

# Exclude these files from your site's output
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - .sass-cache/

# Collections for Artists and Albums
collections:
  artists:
    output: true
    permalink: /artists/:path/
  albums:
    output: true
    permalink: /albums/:path/

# Default front matter for artists
defaults:
  - scope:
      type: artists
    values:
      layout: artist

# Default front matter for albums
defaults:
  - scope:
      type: albums
    values:
      layout: album
