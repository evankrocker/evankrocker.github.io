---
layout: default
title: Home
---
<div class="artists-grid">
    {% for artist in site.artists %}
    <div class="artist-card">
        <h2><a href="{{ artist.url | relative_url }}">{{ artist.name }}</a></h2>
        <p>{{ artist.albums.size }} albums in collection</p>
    </div>
    {% endfor %}
</div>
