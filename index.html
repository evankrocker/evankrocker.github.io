---
layout: default
title: Vinyl Collection
---

<h2>Vinyl Collection</h2>


<table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">First</th>
      <th scope="col">Last</th>
      <th scope="col">Handle</th>
    </tr>
  </thead>
  <tbody>
     {% for album in site.data.albums %}
    <tr>
      <th scope="row">1</th>
      <td> <img src="{{ album.artwork }}" class="card-img-top" alt="..."></td>
      <td>{{ album.artist }}</td>
      <td>{{ album.title }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
