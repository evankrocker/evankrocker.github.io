---
layout: default
title: Vinyl Collection
---

<h2>Vinyl Collection</h2>

<div>
  <label for="sort">Sort by:</label>
  <select id="sort" onchange="sortAlbums()">
    <option value="artist">Artist</option>
    <option value="genre">Genre</option>
    <option value="year">Year Released</option>
  </select>
</div>

<ul id="album-list">
  {% for album in site.data.albums %}
  <li>
    <img src="{{ album.artwork }}" alt="{{ album.title }} artwork" width="100">
    <p><strong>{{ album.artist }} - {{ album.title }}</strong></p>
    <p>Genre: {{ album.genre }}</p>
    <p>Year: {{ album.year }}</p>
  </li>
  {% endfor %}
</ul>

<script>
function sortAlbums() {
  const sortBy = document.getElementById('sort').value;
  const list = document.getElementById('album-list');
  const items = Array.from(list.getElementsByTagName('li'));

  items.sort((a, b) => {
    const aValue = a.querySelector(`p:contains(${sortBy.charAt(0).toUpperCase() + sortBy.slice(1)})`).textContent.split(': ')[1];
    const bValue = b.querySelector(`p:contains(${sortBy.charAt(0).toUpperCase() + sortBy.slice(1)})`).textContent.split(': ')[1];

    if (sortBy === 'year') {
      return parseInt(aValue) - parseInt(bValue);
    }
    return aValue.localeCompare(bValue);
  });

  items.forEach(item => list.appendChild(item));
}
</script>
