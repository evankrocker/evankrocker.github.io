---
layout: default
title: Home
---

<table class="table">
  <thead>
    <tr>
      <th scope="col">Artist</th>
      <th scope="col">Collection Count</th>
    </tr>
  </thead>
  <tbody>
      {% for artist in site.artists %}
    <tr>
      <td><a href="{{ artist.url | relative_url }}">{{ artist.name }}</a></td>
      <td>{{ artist.albums.size }}</td>
    </tr>
      {% endfor %}
 
  </tbody>
</table>
