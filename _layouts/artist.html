---
layout: default
---
<div class="artist-page">
    <h1>{{ page.name }}</h1>

    {% for album in page.albums %}
<div class="card" style="width: 18rem;">
  <img src="{{ album.cover }}" class="card-img-top" alt="...">
  <div class="card-body">
    <p class="card-text">
         <h3>{{ album.title }}</h3>
            <p class="year">{{ album.year }}</p>
    </p>
  </div>
</div>
    {% endfor %}
    

    </div>
</div>
