---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  {% if page.image %}
  <img src="{{ page.image }}" alt="{{ page.title }} cover" />
  {% endif %}

  {{ content }}

  <h2>Albums</h2>
  <ul>
    {% assign albums_by_artist = site.albums | where: "artist", page.title %}
    {% for album in albums_by_artist %}
      <li><a href="{{ album.url }}">{{ album.title }}</a></li>
    {% endfor %}
  </ul>
</article>
