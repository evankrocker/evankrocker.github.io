---
layout: default
---
<div class="artist-page">
    <h1>{{ page.name }}</h1>
    {% if page.bio %}
    <div class="artist-bio">
        {{ page.bio }}
    </div>
    {% endif %}
    
    <h2>Albums</h2>
    <div class="albums-grid">
        {% for album in page.albums %}
        <div class="album-card">
            {% if album.cover %}
            <img src="{{ album.cover }}" alt="{{ album.title }} cover">
            {% endif %}
            <h3>{{ album.title }}</h3>
            <p class="year">{{ album.year }}</p>
            {% if album.notes %}
            <p class="notes">{{ album.notes }}</p>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</div>
