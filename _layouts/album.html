---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>
  <h2>by {{ page.artist }}</h2>

  {% if page.cover_art %}
  <img src="{{ page.cover_art }}" alt="{{ page.title }} cover" />
  {% endif %}

  {{ content }}

  {% if page.tracks %}
  <h2>Tracklist</h2>
  <ul>
    {% for track in page.tracks %}
      <li>{{ track }}</li>
    {% endfor %}
  </ul>
  {% endif %}

</article>
